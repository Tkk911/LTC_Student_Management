<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - LTC Student Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-letters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .logo-letters span {
            font-size: 60px;
            font-weight: 800;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text {
            text-align: center;
        }

        .laemthong {
            font-size: 18px;
            font-weight: 600;
            color: #1a2a6c;
            letter-spacing: 2px;
        }

        .technology {
            font-size: 12px;
            color: #666;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1a2a6c;
            box-shadow: 0 0 0 3px rgba(26,42,108,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-guest {
            width: 100%;
            padding: 12px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-guest:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #ddd;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: white;
            padding: 0 10px;
            color: #999;
            font-size: 14px;
        }

        .error-msg {
            background: #fee;
            color: #f44336;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <div class="logo-letters">
                    <span>L</span>
                    <span>T</span>
                    <span>C</span>
                </div>
                <div class="logo-text">
                    <span class="laemthong">LAEMTHONG TECHNOLOGY COLLEGE</span><br>
                    <span class="technology">ระบบจัดการรายชื่อนักศึกษา</span>
                </div>
            </div>
            <h2>เข้าสู่ระบบ</h2>
            <div id="errorMsg" class="error-msg"></div>
            <div class="input-group">
                <label>👤 ชื่อผู้ใช้</label>
                <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" autocomplete="off">
            </div>
            <div class="input-group">
                <label>🔒 รหัสผ่าน</label>
                <input type="password" id="password" placeholder="กรอกรหัสผ่าน">
            </div>
            <button class="btn-login" onclick="login()">เข้าสู่ระบบ</button>
            <div class="divider">
                <span>หรือ</span>
            </div>
            <button class="btn-guest" onclick="guestLogin()">เข้าชมแบบผู้เยี่ยมชม</button>
            <div class="info-text">
                <strong>📌 ทดสอบระบบ:</strong> admin / admin123
            </div>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('ltc_user_role', 'admin');
                localStorage.setItem('ltc_user_name', username);
                window.location.href = 'index.html';
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = '❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        }

        function guestLogin() {
            localStorage.setItem('ltc_user_role', 'guest');
            localStorage.setItem('ltc_user_name', 'ผู้เยี่ยมชม');
            window.location.href = 'index.html';
        }

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
