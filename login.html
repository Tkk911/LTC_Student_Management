<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTC Student Management System - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #0c0f1e 0%, #1a1f3a 50%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Decorative background elements */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            top: -150px;
            right: -150px;
            border-radius: 50%;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,100,100,0.08) 0%, transparent 70%);
            bottom: -200px;
            left: -200px;
            border-radius: 50%;
        }

        .login-container {
            width: 100%;
            max-width: 460px;
            padding: 20px;
            z-index: 1;
        }

        .login-box {
            background: rgba(255,255,255,0.98);
            border-radius: 32px;
            padding: 45px 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }

        .login-box:hover {
            transform: translateY(-5px);
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: transparent;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            overflow: hidden;
        }

        .logo h2 {
            font-size: 28px;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }

        .logo p {
            font-size: 13px;
            color: #888;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }

        .btn-guest {
            width: 100%;
            padding: 14px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-guest:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #ddd;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .divider span {
            background: white;
            padding: 0 12px;
            color: #999;
            font-size: 13px;
        }

        .error-msg {
            background: #fee;
            color: #f44336;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
            display: none;
        }

        .info-text {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #aaa;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-box {
            animation: fadeInUp 0.6s ease;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <div class="logo-icon">
                    <img src="logoLTC.png" alt="LTC Logo" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <h2>LTC Information System</h2>
                <p>Laemthong Technology College</p>
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <div class="input-group">
                <label>👤 ชื่อผู้ใช้</label>
                <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" autocomplete="off">
            </div>
            <div class="input-group">
                <label>🔒 รหัสผ่าน</label>
                <input type="password" id="password" placeholder="กรอกรหัสผ่าน">
            </div>
            <button class="btn-login" onclick="login()">🔐 เข้าสู่ระบบ</button>
            <div class="divider">
                <span>หรือ</span>
            </div>
            <button class="btn-guest" onclick="guestLogin()">👁️ เข้าชมแบบผู้เยี่ยมชม</button>
            <div class="info-text">
                <strong>📌 ทดสอบระบบ:</strong> 
            </div>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (username === 'admin' && password === 'admin452026') {
                localStorage.setItem('ltc_user_role', 'admin');
                localStorage.setItem('ltc_user_name', username);
                window.location.href = 'index.html';
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = '❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        }

        function guestLogin() {
            localStorage.setItem('ltc_user_role', 'guest');
            localStorage.setItem('ltc_user_name', 'ผู้เยี่ยมชม');
            window.location.href = 'index.html';
        }

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
<script>
        // ตัวแปรเก็บสถานะการป้องกัน
        let protectionEnabled = true;
        
        // ฟังก์ชันป้องกันการคลิกขวา
        function preventRightClick(e) {
            if (protectionEnabled) {
                e.preventDefault();
                alert('การคลิกขวาถูกปิดใช้งานบนหน้านี้');
            }
        }
        
        // เพิ่ม event listener สำหรับป้องกันการคลิกขวา
        document.addEventListener('contextmenu', preventRightClick);
        
        // ฟังก์ชันเปิดการป้องกัน
        document.getElementById('enableBtn').addEventListener('click', function() {
            protectionEnabled = true;
            alert('เปิดการป้องกันการคลิกขวาแล้ว');
        });
        
        // ฟังก์ชันปิดการป้องกัน
        document.getElementById('disableBtn').addEventListener('click', function() {
            protectionEnabled = false;
            alert('ปิดการป้องกันการคลิกขวาแล้ว');
        });
    </script>    
    
</body>
</html>
